# ═══════════════════════════════════════════════════════════════
# docker-compose.yml — Production
# Services : app (Next.js), postgres, redis
# Usage : docker-compose up -d --build
# ═══════════════════════════════════════════════════════════════

name: homelab-dashboard

services:

  # ── Application Next.js ──────────────────────────────────────
  app:
    # build local si pas d'image pre-built (CI/CD non configuré)
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/${GITHUB_REPOSITORY:-homelab-dashboard/homelab-dashboard}:${IMAGE_TAG:-latest}
    container_name: homelab-dashboard-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_INITIAL_PASSWORD: ${ADMIN_INITIAL_PASSWORD}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      HOME_ASSISTANT_URL: ${HOME_ASSISTANT_URL:-}
      HOME_ASSISTANT_TOKEN: ${HOME_ASSISTANT_TOKEN:-}
      VIKUNJA_URL: ${VIKUNJA_URL:-}
      VIKUNJA_TOKEN: ${VIKUNJA_TOKEN:-}
      N8N_URL: ${N8N_URL:-}
      N8N_API_KEY: ${N8N_API_KEY:-}
      DOCMOST_URL: ${DOCMOST_URL:-}
      ACTUAL_URL: ${ACTUAL_URL:-}
      OLLAMA_URL: ${OLLAMA_URL:-}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Homelab Dashboard}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      DASHBOARD_USERNAME: ${DASHBOARD_USERNAME:-admin}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD}
      DASHBOARD_SESSION_DURATION: ${DASHBOARD_SESSION_DURATION:-86400}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - homelab-internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── PostgreSQL 16 ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: homelab-dashboard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-homelab_dashboard}
      POSTGRES_USER: ${POSTGRES_USER:-homelab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - homelab-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-homelab} -d ${POSTGRES_DB:-homelab_dashboard}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis 7 ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: homelab-dashboard-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - homelab-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

# ── Volumes persistants ───────────────────────────────────────
volumes:
  postgres_data:
    name: homelab-dashboard-postgres-data
  redis_data:
    name: homelab-dashboard-redis-data

# ── Réseau interne isolé ──────────────────────────────────────
networks:
  homelab-internal:
    name: homelab-dashboard-network
    driver: bridge
